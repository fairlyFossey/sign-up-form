<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="left-column">
        <img src="img/pained-nails-vertical.jpg"
            alt="A woman's hand showing off a mix of jet black and tortoise-shell styled nails." 
            width="4160"
            height="6240" />
        <div class="shaded-background">
            <div id="logo-name-pkg">
                <div class="logo-container">
                    <img id="logo-img" src="img/flower-icon.svg"/>
                </div>
                <p id="company-name">Nail'd it!</p>
            </div>
        </div>
        <div class="img-attribution">
            <span>lorem3</span>
        </div>
    </div>
    <div id="right-column">
        <div>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Numquam temporibus distinctio nisi, rem
                optio autem. Quasi sint libero exercitationem temporibus.</p>
        </div>
        <div>
            <form method="post" id="form">
                <p>Lorem ipsum dolor sit amet.</p>
                <div>
                    <div class="input-label-group">
                        <label for="first_name">First name</label>
                        <input type="text" id="first_name" name="first_name">
                    </div>
                    <div class="input-label-group">
                        <label for="last_name">Last name</label>
                        <input type="text" id="last_name" name="last_name">
                    </div>
                </div>
                <div>
                    <div class="input-label-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="input-label-group">
                        <label for="phone">Phone number</label>
                        <input type="tel" id="phone" name="phone_number">
                    </div>
                </div>
                <div>
                    <div class="input-label-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password">
                    </div>

                    <div class="input-label-group">
                        <label for="password_confirm">Confirm password</label>
                        <input type="password" id="password_confirm" name="password_confirm">
                    </div>
                </div>
            </form>
        </div>
        <div>
            <div>
                <button type="submit" form="form">Create Account</button>
            </div>
            <div id="user-has-account">
                <span>Already have an account?</span>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Left column -->
    <div class="left-column">

        <!-- Background image -->
        <img src="img/pained-nails-vertical.jpg"
            alt="A woman's hand showing off a mix of jet black and tortoise-shell styled nails." 
            width="4160"
            height="6240">

        <!-- Company name banner -->
        <div class="shaded-background">
            <div class="logo-name-pkg">
                <div class="logo-container">
                    <img class="logo-img" src="img/flower-icon.svg" alt="">
                </div>
                <p class="company-name">Nail'd it!</p>
            </div>
        </div>

        <!-- Image attribution -->
        <div class="img-attribution-container">
            <div class="img-attribution">Photo by 
                <a href="https://unsplash.com/@b_elena" target="_blank" rel="noreferrer">Bryony Elena</a> 
                on <a href="https://unsplash.com/" target="_blank" rel="noreferrer">Unsplash</a> 
            </div>
        </div>
    </div>

    <!-- Right column -->
    <div class="right-column">

        <!-- Promotional paragraph -->
        <div>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. 
                Numquam temporibus distinctio nisi, rem optio autem. 
                Quasi sint libero exercitationem temporibus.</p>
        </div>

        <!-- Form -->
        <div>
            <form method="post" id="form">
                <p>Lorem ipsum dolor sit amet.</p>
                <div>
                    <div class="input-label-group">
                        <label for="first_name">First name</label>
                        <input type="text" id="first_name" name="first_name">
                    </div>
                    <div class="input-label-group">
                        <label for="last_name">Last name</label>
                        <input type="text" id="last_name" name="last_name">
                    </div>
                </div>
                <div>
                    <div class="input-label-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="input-label-group">
                        <label for="phone">Phone number</label>
                        <input type="tel" id="phone" name="phone_number">
                    </div>
                </div>
                <div>
                    <div class="input-label-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password">
                    </div>

                    <div class="input-label-group">
                        <label for="password_confirm">Confirm password</label>
                        <input type="password" id="password_confirm" name="password_confirm">
                    </div>
                </div>
            </form>
        </div>

        <!-- Form submission -->
        <div>
            <div>
                <button type="submit" form="form">Create Account</button>
            </div>
            <div class="user-has-account">
                <span>Already have an account?</span>
            </div>
        </div>
    </div>
</body>

</html>
